<!DOCTYPE html>
<html>
<head>
  <script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    html, body {
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0b0d12;
    }

    model-viewer {
      width:100%;
      height:100vh;
    }
  </style>
</head>

<body>

<model-viewer
  src="2020_f1_mercedes-benz_w11.glb"
  camera-controls
  auto-rotate
  interaction-prompt="none"
  camera-orbit="90deg 75deg 0.8m"
  shadow-intensity="1"
  exposure="1">
</model-viewer>

</body>
</html>
